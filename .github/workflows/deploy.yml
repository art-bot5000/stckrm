name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  preflight:
    name: Pre-flight checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          REQUIRED=(
            app.js scanner.js styles.css
            index.html landing.html
            sw.js manifest.json admin.html
            main.ts deno.json start.sh Caddyfile
          )
          MISSING=()
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$f" ]; then
              MISSING+=("$f")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "❌ Missing required files: ${MISSING[*]}"
            exit 1
          fi
          echo "✅ All required files present"

      - name: Check JS syntax
        run: |
          node --check app.js   && echo "✅ app.js syntax OK"
          node --check scanner.js && echo "✅ scanner.js syntax OK"

      - name: Check Dockerfile references
        run: |
          DOCKERFILE_FILES=(
            app.js scanner.js styles.css
            index.html landing.html admin.html
            sw.js manifest.json
          )
          MISSING=()
          for f in "${DOCKERFILE_FILES[@]}"; do
            if [ ! -f "$f" ]; then
              MISSING+=("$f")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "❌ Dockerfile references missing files: ${MISSING[*]}"
            exit 1
          fi
          echo "✅ All Dockerfile COPY references exist"

  deploy:
    name: Deploy
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      # Diagnostic: show flyctl version and current state before deploying
      - name: Flyctl diagnostics
        run: |
          echo "=== flyctl version ==="
          flyctl version

          echo ""
          echo "=== Machine list ==="
          flyctl machine list --app stckrm

          echo ""
          echo "=== Volume list ==="
          flyctl volume list --app stckrm

          echo ""
          echo "=== App status ==="
          flyctl status --app stckrm
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # Wake the existing machine before deploying
      - name: Wake existing machine
        run: |
          MACHINE_ID=$(flyctl machine list --app stckrm --json | python3 -c "
          import sys, json
          machines = json.load(sys.stdin)
          if machines:
              print(machines[0]['id'])
          ")
          if [ -n "$MACHINE_ID" ]; then
            echo "Starting machine $MACHINE_ID (no-op if already running)"
            flyctl machine start "$MACHINE_ID" --app stckrm || true
            sleep 5
          else
            echo "No existing machine found"
            exit 1
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --strategy immediate --update-only --verbose
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        # --strategy immediate: update existing machine in place, no orchestration
        # --update-only: only update existing machines, never create new ones
        # --verbose: show what flyctl is actually doing

      - name: Verify deployment health
        if: always()
        run: |
          sleep 10
          flyctl status --app stckrm
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

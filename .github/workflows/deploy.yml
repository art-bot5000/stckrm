name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  preflight:
    name: Pre-flight checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          REQUIRED=(
            app.js scanner.js styles.css
            index.html landing.html
            sw.js manifest.json admin.html
            main.ts deno.json start.sh Caddyfile
          )
          MISSING=()
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$f" ]; then
              MISSING+=("$f")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "❌ Missing required files: ${MISSING[*]}"
            exit 1
          fi
          echo "✅ All required files present"

      - name: Check JS syntax
        run: |
          node --check app.js   && echo "✅ app.js syntax OK"
          node --check scanner.js && echo "✅ scanner.js syntax OK"

      - name: Check Dockerfile references
        run: |
          DOCKERFILE_FILES=(
            app.js scanner.js styles.css
            index.html landing.html admin.html
            sw.js manifest.json
          )
          MISSING=()
          for f in "${DOCKERFILE_FILES[@]}"; do
            if [ ! -f "$f" ]; then
              MISSING+=("$f")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "❌ Dockerfile references missing files: ${MISSING[*]}"
            exit 1
          fi
          echo "✅ All Dockerfile COPY references exist"

  deploy:
    name: Deploy
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --strategy rolling --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify deployment health
        if: always()
        run: |
          sleep 5
          flyctl status --app stckrm
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

# fly.toml app configuration file generated for stckrm on 2026-04-12T00:08:22+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'stckrm'
primary_region = 'lhr'

[build]
  dockerfile = 'Dockerfile'

[env]
  DENO_KV_PATH = '/data/stockroom.db'

[[mounts]]
  source = 'stockroom_data'
  destination = '/data'

[[services]]
  protocol = 'tcp'
  internal_port = 8080
  auto_stop_machines = 'stop'
  auto_start_machines = true

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [services.concurrency]
    type = 'requests'
    hard_limit = 200
    soft_limit = 150

  [[services.http_checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/ping'
    protocol = 'http'

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256

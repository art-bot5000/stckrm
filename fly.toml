# fly.toml app configuration file
app = 'stckrm'
primary_region = 'lhr'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'rolling'

[env]
  DENO_KV_PATH = '/data/stockroom.db'

[[mounts]]
  source = 'stockroom_data'
  destination = '/data'
  initial_size = '1gb'
  snapshot_retention = 5

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 200
    soft_limit = 150

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
